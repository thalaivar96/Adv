<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adv Physics Notes</title>

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax for rendering equations -->
  <script>
    window.MathJax = {
      startup: { typeset: false },
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: true,
        processEnvironments: true
      },
      chtml: { scale: 1.2 }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    /* --- Reset & Base Styles --- */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      display: flex;
      height: 100vh;
      overflow: hidden; /* Prevent body scroll, use inner scroll areas */
    }

    /* --- Sidebar Menu --- */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #0a0a0a;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-header {
      padding: 20px 15px;
      background: #000;
      border-bottom: 1px solid #222;
    }

    .sidebar-title {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 15px 0;
      text-align: center;
      letter-spacing: 1px;
    }

    #search-input {
      width: 100%;
      padding: 10px 12px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #search-input:focus { border-color: #555; }

    .nav-buttons {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-btn {
      background: #141414;
      border: 1px solid #2a2a2a;
      color: #bbb;
      padding: 12px 16px;
      text-align: left;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      width: 100%;
    }

    .nav-btn:hover { background: #222; color: #fff; }
    .nav-btn.active {
      background: #fff;
      color: #000;
      border-color: #fff;
      font-weight: 600;
    }

    /* --- Main Content Layout --- */
    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0; 
    }

    /* Mobile Top Bar */
    #mobile-topbar {
      display: none;
      background: #000;
      padding: 12px 20px;
      border-bottom: 1px solid #222;
      align-items: center;
      gap: 15px;
      z-index: 900;
    }

    .menu-toggle-btn {
      background: none;
      border: 1px solid #444;
      color: #fff;
      font-size: 20px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-toggle-btn:active { background: #222; }

    .mobile-page-title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }

    /* Scrollable Content Region */
    #content-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      scroll-behavior: smooth;
    }

    .content-container {
      max-width: 850px;
      margin: 0 auto;
    }

    /* --- Typography & Elements in Content --- */
    h1 { font-size: 2.2em; color: #fff; border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
    h2 { font-size: 1.6em; color: #eee; margin-top: 1.5em; }
    h3 { color: #ddd; }
    p, li { color: #aaa; }
    a { color: #4da6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .formula {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      margin: 25px 0;
      text-align: center;
      overflow-x: auto;
    }
    .inline-formula {
      background: #111;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.95em;
    }
    
    mjx-container[display="true"] { margin: 1em 0 !important; }
    
    .loader {
      width: 40px; height: 40px;
      border: 3px solid #222;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Mobile Overlay --- */
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(2px);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* --- Responsive Media Query --- */
    @media (max-width: 850px) {
      #mobile-topbar { display: flex; }
      #sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%); /* Hidden by default on mobile */
      }
      #sidebar.open { transform: translateX(0); /* Slide in */ }
      #overlay.show { display: block; opacity: 1; }
      #content-scroll-area { padding: 25px 20px; }
    }
  </style>
</head>
<body>

  <!-- Overlay for mobile clicking to close -->
  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title">Chapters</h2>
      <input type="search" id="search-input" placeholder="Search chapters...">
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" data-file="kinematics.md" onclick="loadChapter('kinematics.md')">Kinematics</button>
      <button class="nav-btn" data-file="error.md" onclick="loadChapter('error.md')">ERRORS, MEASUREMENTS & INSTRUMENTS</button>
      <button class="nav-btn" data-file="NLM.md" onclick="loadChapter('NLM.md')">NLM</button>
      <button class="nav-btn" data-file="WEP.md" onclick="loadChapter('WEP.md')">Work Energy Power</button>
      <button class="nav-btn" data-file="COM.md" onclick="loadChapter('COM.md')">COM, Momentum & Collisions</button>
      <button class="nav-btn" data-file="rotation.md" onclick="loadChapter('rotation.md')">Rigid Body Dynamics</button>
      <button class="nav-btn" data-file="gravitation.md" onclick="loadChapter('gravitation.md')">Gravitation</button>
      <button class="nav-btn" data-file="fluids-and-solids.md" onclick="loadChapter('fluids-and-solids.md')">Fluids and Solids</button>
      <button class="nav-btn" data-file="SHM.md" onclick="loadChapter('SHM.md')">SHM</button>
      <button class="nav-btn" data-file="waves.md" onclick="loadChapter('waves.md')">Waves</button>
      <button class="nav-btn" data-file="calorimetry.md" onclick="loadChapter('calorimetry.md')">Thermal Expansion & Calorimetry</button>
      <button class="nav-btn" data-file="heat-transfer.md" onclick="loadChapter('heat-transfer.md')">Heat Transfer</button>
      <button class="nav-btn" data-file="KTG.md" onclick="loadChapter('KTG.md')">Kinetic Theory Of Gases</button>
      <button class="nav-btn" data-file="thermodynamics.md" onclick="loadChapter('thermodynamics.md')">Thermodynamics</button>
      <button class="nav-btn" data-file="complete.md" onclick="loadChapter('complete.md')">Complete</button>
    </div>
  </nav>

  <!-- Main Area -->
  <main id="main-area">
    <!-- Mobile Top Bar -->
    <header id="mobile-topbar">
      <button class="menu-toggle-btn" onclick="openSidebar()" aria-label="Open Menu">☰</button>
      <h1 class="mobile-page-title">Adv Physics Notes</h1>
    </header>

    <!-- Scrollable Content -->
    <div id="content-scroll-area">
      <div class="content-container" id="content">
        <!-- Markdown content loads here -->
      </div>
    </div>
  </main>

  <script>
    // --- Sidebar Controls ---
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    // --- Search Functionality ---
    document.getElementById('search-input').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const match = btn.textContent.toLowerCase().includes(query);
        btn.style.display = match ? 'block' : 'none';
      });
    });

    // --- Chapter Loading Logic ---
    const LAST_CHAPTER_KEY = "jee-formula-last-chapter";
    const DEFAULT_CHAPTER = "kinematics.md";

    function fileToHash(file) {
      return file.replace(/\.md$/i, "").toLowerCase();
    }

    function hashToFile(hash) {
      const normalizedHash = hash.replace(/^#/, "").trim().toLowerCase();
      if (!normalizedHash) return null;
      const btn = document.querySelector(`.nav-btn[data-file="${normalizedHash}.md"]`);
      return btn ? `${normalizedHash}.md` : null;
    }

    function setActiveButton(file) {
      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.file === file);
      });
    }

    function extractMath(content) {
      const mathStore = [];
      function stash(html) {
        const token = `@@MATH_${mathStore.length}@@`;
        mathStore.push(html);
        return token;
      }
      const withBlockMath = content.replace(/\$\$([\s\S]*?)\$\$/g, (_, eq) => {
        return stash(`<div class="formula">$$${eq.trim()}$$</div>`);
      });
      const withInlineMath = withBlockMath.replace(/(?<!\\)\$(?!\$)(.+?)(?<!\\)\$/g, (_, eq) => {
        return stash(`<span class="inline-formula">$${eq.trim()}$</span>`);
      });
      return { content: withInlineMath, mathStore };
    }

    function restoreMath(html, mathStore) {
      return html.replace(/@@MATH_(\d+)@@/g, (_, idx) => mathStore[Number(idx)]);
    }

    async function render(markdown) {
      const { content: safeMarkdown, mathStore } = extractMath(markdown);
      const parsedHtml = marked.parse(safeMarkdown);
      const finalHtml = restoreMath(parsedHtml, mathStore);
      
      const container = document.getElementById("content");
      if (window.MathJax && typeof MathJax.typesetClear === "function") {
        MathJax.typesetClear([container]);
      }
      
      container.innerHTML = finalHtml;
      await MathJax.typesetPromise([container]);
    }

    function showLoader() {
      document.getElementById("content").innerHTML = '<div class="loader"></div>';
    }

    function loadChapter(file, updateHash = true) {
      setActiveButton(file);
      closeSidebar(); // Auto-close menu on mobile after selection
      showLoader();

      fetch(file)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(async data => {
          await render(data);
          localStorage.setItem(LAST_CHAPTER_KEY, file);
          if (updateHash) window.location.hash = fileToHash(file);
          document.getElementById('content-scroll-area').scrollTo(0, 0); // Scroll to top
        })
        .catch(err => {
          document.getElementById("content").innerHTML = `<p style="color:red; margin-top:20px;">Failed to load <b>${file}</b>. Make sure the markdown file exists in the same folder.</p>`;
          console.error(err);
        });
    }

    // --- Initialization ---
    window.addEventListener("hashchange", () => {
      const fileFromHash = hashToFile(window.location.hash);
      if (fileFromHash) loadChapter(fileFromHash, false);
    });

    const initialChapter = hashToFile(window.location.hash) || localStorage.getItem(LAST_CHAPTER_KEY) || DEFAULT_CHAPTER;
    loadChapter(initialChapter, !window.location.hash);
  </script>
</body>
        </html>
