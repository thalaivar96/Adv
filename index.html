<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adv Physics Notes</title>

  <!-- Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax for rendering equations -->
  <script>
    window.MathJax = {
      startup: { typeset: false },
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: true,
        processEnvironments: true
      },
      chtml: { scale: 1.15 }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    /* --- CSS Variables (Dark & Light Mode) --- */
    :root {
      /* Dark Theme (Default) */
      --bg-body: #0b0f19;
      --bg-sidebar: #111827;
      --bg-card: #1f2937;
      --bg-hover: #374151;
      --text-main: #9ca3af;
      --text-heading: #f9fafb;
      --text-muted: #6b7280;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --border: #374151;
      --inline-math-bg: rgba(255, 255, 255, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    body.light-mode {
      --bg-body: #ffffff;
      --bg-sidebar: #f8fafc;
      --bg-card: #ffffff;
      --bg-hover: #e2e8f0;
      --text-main: #475569;
      --text-heading: #0f172a;
      --text-muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e2e8f0;
      --inline-math-bg: rgba(0, 0, 0, 0.04);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    /* --- Reset & Base Styles --- */
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: var(--bg-body);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.8;
      display: flex;
      height: 100vh;
      overflow: hidden; 
      transition: background-color 0.3s, color 0.3s;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-main); }

    /* --- Sidebar Menu --- */
    #sidebar {
      width: 300px; min-width: 300px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s, border-color 0.3s;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-title {
      color: var(--text-heading);
      font-size: 18px; font-weight: 600;
      margin: 0; letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-heading);
      width: 32px; height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover { background: var(--bg-hover); }

    .search-container { position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); width: 16px; height: 16px; fill: var(--text-muted);
    }
    #search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-heading);
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: all 0.2s;
    }
    #search-input:focus { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .nav-buttons {
      flex: 1; overflow-y: auto; padding: 12px 0; display: flex; flex-direction: column;
    }
    .nav-btn {
      background: transparent; border: none; border-left: 3px solid transparent;
      color: var(--text-main); padding: 12px 20px 12px 17px;
      text-align: left; cursor: pointer; font-size: 14px; font-weight: 500;
      transition: all 0.2s; width: 100%;
    }
    .nav-btn:hover { background: var(--bg-hover); color: var(--text-heading); }
    .nav-btn.active {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
    }

    /* --- Main Content Layout --- */
    #main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    #progress-container { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 100; }
    #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s ease-out; }

    #mobile-topbar {
      display: none;
      background: var(--bg-sidebar);
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      align-items: center; gap: 15px; z-index: 900; position: sticky; top: 0;
    }
    .menu-toggle-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-heading); padding: 6px 10px; border-radius: 6px; cursor: pointer;
    }

    #content-scroll-area { flex: 1; overflow-y: auto; padding: 50px 40px; scroll-behavior: smooth; }
    .content-container { max-width: 760px; margin: 0 auto; opacity: 0; transform: translateY(15px); }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    /* --- Article Typography & Elements --- */
    h1, h2, h3 { color: var(--text-heading); font-weight: 600; scroll-margin-top: 80px; }
    h1 { font-size: 2.4em; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin: 0 0 10px 0; font-weight: 700; }
    h2 { font-size: 1.7em; margin-top: 1.8em; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    h3 { font-size: 1.25em; margin-top: 1.5em; }
    p, li { margin-bottom: 1em; }
    
    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* Reading Meta */
    .article-meta {
      display: flex; gap: 15px; color: var(--text-muted); font-size: 0.9em;
      margin-bottom: 30px; align-items: center;
    }
    
    /* Table of Contents */
    .toc-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px; margin: 30px 0;
    }
    .toc-title { font-weight: 600; color: var(--text-heading); margin-bottom: 12px; font-size: 1.1em; }
    .toc-list { list-style: none; padding: 0; margin: 0; font-size: 0.95em; }
    .toc-list li { margin-bottom: 8px; }
    .toc-list li.toc-h3 { padding-left: 20px; font-size: 0.9em; }
    .toc-list a { color: var(--text-main); }
    .toc-list a:hover { color: var(--accent); text-decoration: none; }

    /* Images */
    img {
      max-width: 100%; height: auto; display: block; margin: 32px auto;
      border-radius: 8px; border: 1px solid var(--border); background: #fff; /* Good for transparent diagrams */
    }

    /* Math Styling */
    .formula {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin: 32px 0; text-align: center; overflow-x: auto;
      box-shadow: var(--shadow);
    }
    .inline-formula {
      color: var(--text-heading); background: var(--inline-math-bg);
      padding: 2px 5px; border-radius: 4px; font-size: 1em;
    }
    mjx-container[display="true"] { margin: 0 !important; }

    /* Next / Prev Navigation */
    .chapter-nav {
      display: flex; justify-content: space-between; gap: 20px;
      margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border);
    }
    .chap-nav-btn {
      flex: 1; padding: 16px 20px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-heading); text-decoration: none;
      display: flex; flex-direction: column; transition: all 0.2s; cursor: pointer;
    }
    .chap-nav-btn:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .chap-nav-label { font-size: 0.8em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
    .chap-nav-title { font-weight: 600; font-size: 1.1em; color: var(--accent); }
    .nav-right { text-align: right; }

    /* Loaders & Buttons */
    .loader {
      width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 80px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #back-to-top {
      position: fixed; bottom: 30px; right: 30px; width: 44px; height: 44px;
      background: var(--accent); color: white; border: none; border-radius: 50%;
      cursor: pointer; opacity: 0; transform: translateY(20px); pointer-events: none;
      transition: all 0.3s; display: flex; align-items: center; justify-content: center; z-index: 800;
    }
    #back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    #overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 999; opacity: 0; transition: opacity 0.3s;
    }

    @media (max-width: 850px) {
      #mobile-topbar { display: flex; }
      #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #overlay.show { display: block; opacity: 1; }
      #content-scroll-area { padding: 30px 20px; }
      #progress-container { top: 57px; }
      .chapter-nav { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-top-row">
        <h2 class="sidebar-title">Chapters</h2>
        <!-- Theme Toggle Button -->
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme" id="theme-btn">
          <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg id="sun-icon" style="display:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
      </div>
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M10 18a7.952 7.952 0 0 0 4.897-1.688l4.396 4.396 1.414-1.414-4.396-4.396A7.952 7.952 0 0 0 18 10c0-4.411-3.589-8-8-8s-8 3.589-8 8 3.589 8 8 8zm0-14c3.309 0 6 2.691 6 6s-2.691 6-6 6-6-2.691-6-6 2.691-6 6-6z"></path></svg>
        <input type="search" id="search-input" placeholder="Search topics...">
      </div>
    </div>
    <div class="nav-buttons" id="nav-container">
      <button class="nav-btn" data-file="kinematics.md" onclick="loadChapter('kinematics.md')">Kinematics</button>
      <button class="nav-btn" data-file="error.md" onclick="loadChapter('error.md')">Errors & Measurements</button>
      <button class="nav-btn" data-file="NLM.md" onclick="loadChapter('NLM.md')">Laws of Motion (NLM)</button>
      <button class="nav-btn" data-file="WEP.md" onclick="loadChapter('WEP.md')">Work Energy Power</button>
      <button class="nav-btn" data-file="COM.md" onclick="loadChapter('COM.md')">COM & Collisions</button>
      <button class="nav-btn" data-file="rotation.md" onclick="loadChapter('rotation.md')">Rigid Body Dynamics</button>
      <button class="nav-btn" data-file="gravitation.md" onclick="loadChapter('gravitation.md')">Gravitation</button>
      <button class="nav-btn" data-file="fluids-and-solids.md" onclick="loadChapter('fluids-and-solids.md')">Fluids and Solids</button>
      <button class="nav-btn" data-file="SHM.md" onclick="loadChapter('SHM.md')">Simple Harmonic Motion</button>
      <button class="nav-btn" data-file="waves.md" onclick="loadChapter('waves.md')">Waves</button>
      <button class="nav-btn" data-file="calorimetry.md" onclick="loadChapter('calorimetry.md')">Thermal Exp. & Calorimetry</button>
      <button class="nav-btn" data-file="heat-transfer.md" onclick="loadChapter('heat-transfer.md')">Heat Transfer</button>
      <button class="nav-btn" data-file="KTG.md" onclick="loadChapter('KTG.md')">Kinetic Theory Of Gases</button>
      <button class="nav-btn" data-file="thermodynamics.md" onclick="loadChapter('thermodynamics.md')">Thermodynamics</button>
      <button class="nav-btn" data-file="ELECTROSTATICS.md" onclick="loadChapter('ELECTROSTATICS.md')">Electrostatics</button>
      <button class="nav-btn" data-file="capacitors.md" onclick="loadChapter('capacitors.md')">Capacitors</button>
      <button class="nav-btn" data-file="current.md" onclick="loadChapter('current.md')">Current Electricity</button>
      <button class="nav-btn" data-file="movingcharge.md" onclick="loadChapter('movingcharge.md')">Moving Charge and Magnetism</button>
      <button class="nav-btn" data-file="magnetism.md" onclick="loadChapter('magnetism.md')">Magnetism and Matter</button>
      <button class="nav-btn" data-file="EMI.md" onclick="loadChapter('EMI.md')">EMI</button>
      <button class="nav-btn" data-file="AC.md" onclick="loadChapter('AC.md')">Alternating Current</button>
      <button class="nav-btn" data-file="EMW.md" onclick="loadChapter('EMW.md')">Electromagnetic Waves</button>
      <button class="nav-btn" data-file="rayoptics.md" onclick="loadChapter('rayoptics.md')">Ray Optics</button>
      <button class="nav-btn" data-file="waveoptics.md" onclick="loadChapter('waveoptics.md')">Wave Optics</button>
      <button class="nav-btn" data-file="complete.md" onclick="loadChapter('complete.md')">Complete Notes</button>
    </div>
  </nav>

  <!-- Main Area -->
  <main id="main-area">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <header id="mobile-topbar">
      <button class="menu-toggle-btn" onclick="openSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"></path></svg></button>
      <h1 class="mobile-page-title" style="margin:0; font-size:16px;">Adv Physics Notes</h1>
    </header>

    <div id="content-scroll-area">
      <div class="content-container" id="content"></div>
    </div>

    <button id="back-to-top" onclick="scrollToTop()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </main>

  <script>
    // --- UI Interactions & Theme ---
    const scrollArea = document.getElementById('content-scroll-area');
    const contentContainer = document.getElementById('content');
    
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        document.getElementById('moon-icon').style.display = 'none';
        document.getElementById('sun-icon').style.display = 'block';
      }
    }
    
    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      document.getElementById('moon-icon').style.display = isLight ? 'none' : 'block';
      document.getElementById('sun-icon').style.display = isLight ? 'block' : 'none';
    }
    initTheme();

    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }
    function scrollToTop() { scrollArea.scrollTo({ top: 0, behavior: 'smooth' }); }

    scrollArea.addEventListener('scroll', () => {
      const scrollTop = scrollArea.scrollTop;
      const docHeight = scrollArea.scrollHeight - scrollArea.clientHeight;
      document.getElementById('progress-bar').style.width = docHeight > 0 ? (scrollTop / docHeight) * 100 + '%' : '0%';
      const btn = document.getElementById('back-to-top');
      scrollTop > 400 ? btn.classList.add('visible') : btn.classList.remove('visible');
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.style.display = btn.textContent.toLowerCase().includes(q) ? 'block' : 'none';
      });
    });

    // --- Content Processing & DOM Manipulation ---
    const buttons = Array.from(document.querySelectorAll('.nav-btn'));

    function generateTOCAndMeta(html, rawMarkdown) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      
      // Calculate Reading Time
      const wordCount = rawMarkdown.replace(/[^\w\s]/gi, '').split(/\s+/).length;
      const readTime = Math.ceil(wordCount / 200); // Avg 200 wpm
      
      const h1 = tempDiv.querySelector('h1');
      if (h1) {
        // Insert Meta Tag under H1
        const metaDiv = document.createElement('div');
        metaDiv.className = 'article-meta';
        metaDiv.innerHTML = `
          <span>⏱️ ${readTime} min read</span>
          <span>📚 ${wordCount} words</span>
        `;
        h1.parentNode.insertBefore(metaDiv, h1.nextSibling);

        // Generate Table of Contents
        const headings = tempDiv.querySelectorAll('h2, h3');
        if (headings.length > 0) {
          const tocDiv = document.createElement('div');
          tocDiv.className = 'toc-container';
          tocDiv.innerHTML = `<div class="toc-title">On this page</div><ul class="toc-list"></ul>`;
          const tocList = tocDiv.querySelector('ul');

          headings.forEach((heading, index) => {
            const id = heading.id || `section-${index}`;
            heading.id = id; // Ensure ID exists for jumping
            
            const li = document.createElement('li');
            li.className = heading.tagName.toLowerCase() === 'h3' ? 'toc-h3' : 'toc-h2';
            li.innerHTML = `<a href="#${id}">${heading.textContent}</a>`;
            tocList.appendChild(li);
          });
          
          metaDiv.parentNode.insertBefore(tocDiv, metaDiv.nextSibling);
        }
      }
      return tempDiv.innerHTML;
    }

    function generateFooterNav(currentFile) {
      const index = buttons.findIndex(b => b.dataset.file === currentFile);
      if (index === -1) return '';

      const prev = index > 0 ? buttons[index - 1] : null;
      const next = index < buttons.length - 1 ? buttons[index + 1] : null;

      let navHtml = '<div class="chapter-nav">';
      if (prev) {
        navHtml += `
          <div class="chap-nav-btn" onclick="loadChapter('${prev.dataset.file}')">
            <span class="chap-nav-label">Previous Chapter</span>
            <span class="chap-nav-title">← ${prev.textContent}</span>
          </div>`;
      } else { navHtml += '<div></div>'; }
      
      if (next) {
        navHtml += `
          <div class="chap-nav-btn nav-right" onclick="loadChapter('${next.dataset.file}')">
            <span class="chap-nav-label">Next Chapter</span>
            <span class="chap-nav-title">${next.textContent} →</span>
          </div>`;
      } else { navHtml += '<div></div>'; }
      navHtml += '</div>';
      
      return navHtml;
    }

    function extractMath(content) {
      const mathStore = [];
      function stash(html) { const t = `@@MATH_${mathStore.length}@@`; mathStore.push(html); return t; }
      let out = content.replace(/\$\$([\s\S]*?)\$\$/g, (_, eq) => stash(`<div class="formula">$$${eq.trim()}$$</div>`));
      out = out.replace(/(?<!\\)\$(?!\$)(.+?)(?<!\\)\$/g, (_, eq) => stash(`<span class="inline-formula">$${eq.trim()}$</span>`));
      return { content: out, mathStore };
    }

    function restoreMath(html, mathStore) {
      return html.replace(/@@MATH_(\d+)@@/g, (_, idx) => mathStore[Number(idx)]);
    }

    // --- Core Loading ---
    async function render(markdown, filename) {
      const { content: safeMarkdown, mathStore } = extractMath(markdown);
      let html = marked.parse(safeMarkdown);
      html = restoreMath(html, mathStore);
      
      // Inject TOC and Meta
      html = generateTOCAndMeta(html, markdown);
      
      // Inject Footer Next/Prev Navigation
      html += generateFooterNav(filename);

      if (window.MathJax && typeof MathJax.typesetClear === "function") {
        MathJax.typesetClear([contentContainer]);
      }
      
      contentContainer.innerHTML = html;
      await MathJax.typesetPromise([contentContainer]);
    }

    function loadChapter(file, updateHash = true) {
      buttons.forEach(b => b.classList.toggle('active', b.dataset.file === file));
      closeSidebar(); 
      contentContainer.classList.remove('fade-in');
      contentContainer.innerHTML = '<div class="loader"></div>';
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('back-to-top').classList.remove('visible');

      fetch(file)
        .then(res => { if (!res.ok) throw new Error(); return res.text(); })
        .then(async data => {
          await render(data, file);
          void contentContainer.offsetWidth; 
          contentContainer.classList.add('fade-in');

          localStorage.setItem("jee-formula-last", file);
          if (updateHash) window.history.pushState(null, null, `#${file.replace('.md', '')}`);
          scrollArea.scrollTo(0, 0); 
          
          // Handle inner page anchors if clicked from TOC
          contentContainer.querySelectorAll('.toc-list a').forEach(a => {
            a.addEventListener('click', (e) => {
              e.preventDefault();
              const targetId = a.getAttribute('href').substring(1);
              const targetEl = document.getElementById(targetId);
              if(targetEl) {
                targetEl.scrollIntoView({ behavior: 'smooth' });
              }
            });
          });
        })
        .catch(() => {
          contentContainer.innerHTML = `<h2>Error 404</h2><p>Could not load <b>${file}</b>.</p>`;
          contentContainer.classList.add('fade-in');
        });
    }

    // --- Init ---
    window.addEventListener("popstate", () => {
      const hash = window.location.hash.replace('#', '') + '.md';
      if (document.querySelector(`[data-file="${hash}"]`)) loadChapter(hash, false);
    });

    const initHash = window.location.hash.replace('#', '') + '.md';
    const initialChapter = document.querySelector(`[data-file="${initHash}"]`) ? initHash : 
                          (localStorage.getItem("jee-formula-last") || "kinematics.md");
    loadChapter(initialChapter, false);
  </script>
</body>
</html>
